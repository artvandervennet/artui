name: Release

on:
  push:
    branches: [main]

# id-token: write is required for npm Trusted Publisher (OIDC) auth.
# See the "Create Release PR or publish" step below for the full auth contract.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + publish (Changesets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          # registry-url is load-bearing: it writes the .npmrc that npm publish
          # reads, and OIDC publishing requires this exact registry URL.
          registry-url: https://registry.npmjs.org

      - name: Assert npm >= 11.5.1 (required for Trusted Publisher OIDC)
        run: |
          npm --version
          node -e "const v=require('child_process').execSync('npm --version').toString().trim().split('.').map(Number);if(v[0]<11||(v[0]===11&&v[1]<5)||(v[0]===11&&v[1]===5&&v[2]<1)){console.error('npm '+v.join('.')+' < 11.5.1, OIDC publishing will fail');process.exit(1)}"

      - run: pnpm install --frozen-lockfile

      - name: Build registry
        run: pnpm --filter @artui/registry build

      - name: Build publishable packages
        run: pnpm turbo run build --filter=@artui/cli

      # Auth: npm Trusted Publisher (OIDC). No NPM_TOKEN is used or required.
      # The id-token: write permission + setup-node's registry-url is what
      # lets `npm publish` exchange GitHub's OIDC token for an npm publish credential.
      # Do NOT add NPM_TOKEN here — its presence forces token-mode and breaks the
      # OIDC flow that the @artui/cli npm package is configured for on npmjs.com.
      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm version-packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tag + GitHub Release for the private workspaces (registry, docs).
      # The CLI is handled by changesets/action's createGithubReleases above.
      # Idempotent: skips any tag already on origin.
      - name: Tag + release private packages (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          extract_section() {
            # prints the markdown body between "## <version>" and the next "## " heading
            awk -v v="$2" '
              $0 == "## " v { flag=1; next }
              /^## / && flag { exit }
              flag { print }
            ' "$1"
          }

          publish_tag() {
            local pkg_dir="$1" prefix="$2" name="$3"
            local version
            version=$(node -p "require('./$pkg_dir/package.json').version")
            local tag="$prefix@$version"

            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "Tag $tag already on origin, skipping."
              return
            fi

            git tag "$tag"
            git push origin "$tag"

            local notes_file
            notes_file=$(mktemp)
            extract_section "$pkg_dir/CHANGELOG.md" "$version" > "$notes_file"
            if [ ! -s "$notes_file" ]; then
              printf "Release %s\n" "$tag" > "$notes_file"
            fi
            gh release create "$tag" --title "$name $version" --notes-file "$notes_file"
          }

          publish_tag registry registry "@artui/registry"
          publish_tag apps/docs docs "@artui/docs"
