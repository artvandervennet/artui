name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + publish (Changesets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build registry
        run: pnpm --filter @artui/registry build

      - name: Build publishable packages
        run: pnpm turbo run build --filter=@artui/cli

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Freeze versioned registry snapshot
        if: steps.changesets.outputs.published == 'true'
        run: |
          pnpm --filter @artui/registry build
          pnpm --filter @artui/docs prebuild
          VERSION=$(node -p "require('./registry/package.json').version")
          echo "REGISTRY_VERSION=$VERSION" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/docs/public/registry apps/docs/public/registry.json apps/docs/lib/registry-version.ts
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: freeze registry snapshot v$VERSION"
            git push origin HEAD:main
          fi

      - name: Tag registry release
        if: steps.changesets.outputs.published == 'true'
        run: |
          TAG="registry@$REGISTRY_VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
